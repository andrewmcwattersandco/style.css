<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <!-- https://developer.apple.com/library/archive/documentation/AppleApplications/Reference/SafariWebContent/UsingtheViewport/UsingtheViewport.html -->
    <meta name="viewport" content="width=device-width, viewport-fit=cover">
    <title>grid.css</title>
    <script src="../javascripts/base.js"></script>
    <link rel="stylesheet" href="../stylesheets/style.css">
    <style>
        .type-area > div {
            height: calc(100vh + 1px);
            border-right: 1px solid red;
            border-left: 1px solid red;
        }
    </style>
  </head>
  <body>
    <div class="type-area">
        <div class="       block      hidden-vga">Mobile</div>
        <div class="hidden block-vga  hidden-svga">VGA (640x480)</div>
        <div class="hidden block-svga hidden-xga">SVGA (800x600)</div>
        <div class="hidden block-xga  hidden-hd">XGA (1024x768)</div>
        <div class="hidden block-hd   hidden-fhd">HD (1280x720)</div>
        <div class="hidden block-fhd  hidden-qhd">FHD (1920x1080)</div>
        <div class="hidden block-qhd  hidden-4k">QHD (2560x1440)</div>
        <div class="hidden block-4k   hidden-8k">4K (3840x2160)</div>
        <div class="hidden block-8k">8K (7680x4320)</div>
    </div>
  </body>
</html>
